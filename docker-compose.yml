services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: torquetrace
      POSTGRES_PASSWORD: torquetrace
      POSTGRES_DB: torquetrace
    ports:
      - "5432:5432"
    volumes:
      - torquetrace_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U torquetrace -d torquetrace"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  torquetrace_pg:
